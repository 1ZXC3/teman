<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📚 我的知识助手</title>
    <style>
        :root {
            --bg: #f0f4ff;
            --card: #ffffff;
            --primary: #6c5ce7;
            --primary-light: #a29bfe;
            --text: #2d3436;
            --text-light: #636e72;
            --border: #dfe6e9;
            --success: #00b894;
            --warning: #fdcb6e;
            --danger: #e17055;
            --radius: 16px;
            --shadow: 0 4px 24px rgba(0,0,0,0.06);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* ====== 顶部导航 ====== */
        .navbar {
            background: var(--card);
            border-bottom: 1px solid var(--border);
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .navbar .logo {
            font-size: 22px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .navbar .logo .icon { font-size: 32px; }
        .navbar .stats {
            display: flex;
            gap: 20px;
            font-size: 14px;
            color: var(--text-light);
        }
        .navbar .stats span {
            background: var(--bg);
            padding: 6px 14px;
            border-radius: 20px;
        }

        /* ====== 主布局 ====== */
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 24px;
            display: grid;
            grid-template-columns: 340px 1fr;
            gap: 24px;
            height: calc(100vh - 90px);
        }

        /* ====== 左侧面板 ====== */
        .sidebar {
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            overflow-y: auto;
        }
        .sidebar h3 {
            font-size: 16px;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* 上传区域 */
        .upload-zone {
            border: 2px dashed var(--border);
            border-radius: var(--radius);
            padding: 28px 16px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: #fafbff;
        }
        .upload-zone:hover, .upload-zone.drag-over {
            border-color: var(--primary);
            background: #f0ecff;
            transform: translateY(-1px);
        }
        .upload-zone .upload-icon {
            font-size: 40px;
            margin-bottom: 8px;
        }
        .upload-zone .upload-text {
            font-size: 14px;
            color: var(--text-light);
        }
        .upload-zone .upload-hint {
            font-size: 12px;
            color: #b2bec3;
            margin-top: 6px;
        }
        .upload-zone input { display: none; }

        #upload-status {
            font-size: 12px;
            text-align: center;
            min-height: 20px;
        }
        #upload-status.success { color: var(--success); }
        #upload-status.error { color: var(--danger); }
        #upload-status.loading { color: var(--primary); }

        /* 文档列表 */
        .doc-list {
            list-style: none;
            flex: 1;
            overflow-y: auto;
        }
        .doc-list li {
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            transition: background 0.2s;
            background: var(--bg);
        }
        .doc-list li:hover { background: #e8e4ff; }
        .doc-list .doc-info {
            flex: 1;
            min-width: 0;
        }
        .doc-list .doc-name {
            font-size: 13px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .doc-list .doc-meta {
            font-size: 11px;
            color: var(--text-light);
        }
        .doc-list .del-btn {
            background: none;
            border: none;
            padding: 6px;
            cursor: pointer;
            border-radius: 6px;
            font-size: 16px;
            opacity: 0.5;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .doc-list .del-btn:hover {
            opacity: 1;
            background: #ffeaa7;
        }
        .doc-empty {
            text-align: center;
            padding: 30px;
            color: #b2bec3;
            font-size: 14px;
        }

        /* 按钮 */
        .btn-clear {
            background: none;
            border: 1px solid var(--danger);
            color: var(--danger);
            padding: 8px 16px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }
        .btn-clear:hover {
            background: #fff0ed;
        }

        /* ====== 右侧聊天区 ====== */
        .chat-area {
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 聊天头部 */
        .chat-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            background: linear-gradient(135deg, #6c5ce7 0%, #a29bfe 100%);
            color: white;
        }
        .chat-header h2 {
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .chat-header .mode-badge {
            font-size: 12px;
            background: rgba(255,255,255,0.25);
            padding: 3px 10px;
            border-radius: 12px;
            margin-left: 8px;
        }

        /* 消息列表 */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .msg {
            max-width: 85%;
            padding: 14px 18px;
            border-radius: 18px;
            line-height: 1.6;
            font-size: 15px;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg.user {
            align-self: flex-end;
            background: var(--primary);
            color: white;
            border-bottom-right-radius: 6px;
        }
        .msg.ai {
            align-self: flex-start;
            background: #f1f0ff;
            border-bottom-left-radius: 6px;
        }
        .msg.ai .source-tag {
            display: inline-block;
            font-size: 11px;
            background: #e0dcff;
            color: var(--primary);
            padding: 2px 8px;
            border-radius: 8px;
            margin-top: 8px;
        }
        .msg.ai .model-tag {
            font-size: 11px;
            color: var(--text-light);
            margin-top: 6px;
            opacity: 0.7;
        }

        /* 打字效果 */
        .typing-indicator {
            display: flex;
            gap: 6px;
            padding: 14px 18px;
        }
        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: var(--primary-light);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-10px); }
        }

        /* 输入区域 */
        .chat-input-area {
            padding: 16px 20px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }
        .chat-input-area textarea {
            flex: 1;
            border: 2px solid var(--border);
            border-radius: 14px;
            padding: 12px 16px;
            font-size: 15px;
            font-family: inherit;
            resize: none;
            outline: none;
            min-height: 48px;
            max-height: 120px;
            transition: border-color 0.2s;
        }
        .chat-input-area textarea:focus {
            border-color: var(--primary);
        }
        .chat-input-area button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .chat-input-area button:hover {
            background: #5b4bd5;
            transform: translateY(-1px);
        }
        .chat-input-area button:disabled {
            background: #b2bec3;
            cursor: not-allowed;
            transform: none;
        }

        /* 欢迎消息 */
        .welcome-card {
            text-align: center;
            padding: 40px 20px;
        }
        .welcome-card .welcome-icon {
            font-size: 64px;
            margin-bottom: 16px;
        }
        .welcome-card h3 {
            font-size: 20px;
            margin-bottom: 8px;
            color: var(--primary);
        }
        .welcome-card p {
            color: var(--text-light);
            font-size: 14px;
            line-height: 1.8;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
                height: auto;
            }
            .sidebar {
                max-height: 300px;
            }
            .chat-area {
                min-height: 500px;
            }
        }
    </style>
</head>
<body>

    <!-- 顶部导航 -->
    <nav class="navbar">
        <div class="logo">
            <span class="icon">📚</span>
            <span>我的知识助手</span>
        </div>
        <div class="stats">
            <span>📄 文档: <strong id="doc-count">0</strong></span>
            <span>🧩 片段: <strong id="chunk-count">0</strong></span>
        </div>
    </nav>

    <!-- 主体 -->
    <div class="container">

        <!-- 左侧面板 -->
        <aside class="sidebar">
            <h3>📥 上传文档</h3>

            <div class="upload-zone" id="upload-zone">
                <div class="upload-icon">☁️</div>
                <div class="upload-text">点击上传或拖拽文件到这里</div>
                <div class="upload-hint">支持 PDF、Word、TXT、Markdown</div>
                <input type="file" id="file-input" accept=".pdf,.docx,.txt,.md" multiple>
            </div>

            <div id="upload-status"></div>

            <h3>📋 已上传文档</h3>
            <ul class="doc-list" id="doc-list">
                <li class="doc-empty">还没有上传任何文档哦~ 📭</li>
            </ul>

            <button class="btn-clear" onclick="clearAllDocs()" style="margin-top: auto;">
                🗑️ 清空所有文档
            </button>
        </aside>

        <!-- 右侧聊天 -->
        <main class="chat-area">
            <div class="chat-header">
                <h2>
                    💬 知识问答
                    <span class="mode-badge" id="mode-badge">本地模式</span>
                </h2>
            </div>

            <div class="messages" id="messages">
                <div class="welcome-card">
                    <div class="welcome-icon">🌟</div>
                    <h3>欢迎使用知识助手！</h3>
                    <p>
                        👈 先在左边上传你的文档<br>
                        然后在下面输入问题，我帮你找答案~<br>
                        <br>
                        🎯 <strong>支持 PDF、Word、TXT 格式</strong><br>
                        🔍 <strong>AI 智能搜索 + 理解回答</strong>
                    </p>
                </div>
            </div>

            <div class="chat-input-area">
                <textarea
                    id="question-input"
                    rows="1"
                    placeholder="输入你的问题... 例如：这篇文章讲了什么？"
                    onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();askQuestion();}"
                ></textarea>
                <button onclick="askQuestion()" id="send-btn">发送 ✨</button>
            </div>
        </main>

    </div>

    <script>
        // ==================== 全局状态 ====================
        let currentMode = '本地搜索模式';

        // ==================== 初始化 ====================
        async function init() {
            await refreshDocList();
            await updateStats();
        }

        // ==================== 上传 ====================
        const uploadZone = document.getElementById('upload-zone');
        const fileInput = document.getElementById('file-input');
        const uploadStatus = document.getElementById('upload-status');

        uploadZone.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => uploadFiles(e.target.files));

        // 拖拽上传
        uploadZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadZone.classList.add('drag-over');
        });
        uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
        uploadZone.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadZone.classList.remove('drag-over');
            uploadFiles(e.dataTransfer.files);
        });

        async function uploadFiles(files) {
            for (const file of files) {
                uploadStatus.textContent = `⏳ 正在处理: ${file.name}...`;
                uploadStatus.className = 'loading';

                const formData = new FormData();
                formData.append('file', file);

                try {
                    const resp = await fetch('/api/documents/upload', {
                        method: 'POST',
                        body: formData,
                    });
                    const data = await resp.json();

                    if (resp.ok) {
                        uploadStatus.textContent = `✅ ${file.name} 上传成功！(${data.chunk_count} 个片段)`;
                        uploadStatus.className = 'success';
                    } else {
                        uploadStatus.textContent = `❌ ${file.name}: ${data.detail || '上传失败'}`;
                        uploadStatus.className = 'error';
                    }
                } catch (err) {
                    uploadStatus.textContent = `❌ 网络错误: ${err.message}`;
                    uploadStatus.className = 'error';
                }
            }

            fileInput.value = '';
            await refreshDocList();
            await updateStats();
        }

        // ==================== 文档列表 ====================
        async function refreshDocList() {
            const list = document.getElementById('doc-list');
            try {
                const resp = await fetch('/api/documents');
                const docs = await resp.json();

                if (docs.length === 0) {
                    list.innerHTML = '<li class="doc-empty">还没有上传任何文档哦~ 📭</li>';
                } else {
                    list.innerHTML = docs.map(d => `
                        <li>
                            <span class="doc-info">
                                <span class="doc-name">📄 ${escapeHtml(d.filename)}</span>
                                <span class="doc-meta">${d.chunk_count} 片段 · ${d.file_type}</span>
                            </span>
                            <button class="del-btn" onclick="deleteDoc('${d.id}', '${escapeHtml(d.filename)}')" title="删除">🗑️</button>
                        </li>
                    `).join('');
                }
            } catch (err) {
                console.error(err);
            }
        }

        async function deleteDoc(id, name) {
            if (!confirm(`确定要删除「${name}」吗？`)) return;
            try {
                await fetch(`/api/documents/${id}`, { method: 'DELETE' });
                await refreshDocList();
                await updateStats();
            } catch (err) {
                alert('删除失败: ' + err.message);
            }
        }

        async function clearAllDocs() {
            if (!confirm('确定要删除所有文档吗？此操作不可恢复！')) return;
            try {
                await fetch('/api/documents/clear', { method: 'DELETE' });
                await refreshDocList();
                await updateStats();
            } catch (err) {
                alert('清空失败: ' + err.message);
            }
        }

        async function updateStats() {
            try {
                const resp = await fetch('/api/stats');
                const data = await resp.json();
                document.getElementById('doc-count').textContent = data.doc_count || 0;
                document.getElementById('chunk-count').textContent = data.chunk_count || 0;
                if (data.mode) {
                    currentMode = data.mode;
                    document.getElementById('mode-badge').textContent = data.mode;
                }
            } catch (err) {
                console.error(err);
            }
        }

        // ==================== 问答 ====================
        async function askQuestion() {
            const input = document.getElementById('question-input');
            const question = input.value.trim();
            if (!question) return;

            const sendBtn = document.getElementById('send-btn');
            sendBtn.disabled = true;
            input.value = '';
            input.style.height = 'auto';

            // 添加用户消息
            addMessage('user', question);

            // 添加等待动画
            const typingId = addTyping();

            try {
                const resp = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question }),
                });
                const data = await resp.json();

                removeTyping(typingId);

                if (resp.ok) {
                    let answer = data.answer;
                    if (data.model_used) {
                        answer += `\n\n<span class="model-tag">🤖 模型: ${data.model_used} · ⚡ ${data.latency_ms}ms</span>`;
                    }
                    if (data.source_count > 0) {
                        answer += `\n<span class="source-tag">📖 参考了 ${data.source_count} 个知识片段</span>`;
                    }
                    addMessage('ai', answer);
                } else {
                    addMessage('ai', `😢 出错了: ${data.detail || '未知错误'}`);
                }

                updateStats();
            } catch (err) {
                removeTyping(typingId);
                addMessage('ai', `😢 网络错误: ${err.message}`);
            }

            sendBtn.disabled = false;
            input.focus();
        }

        function addMessage(type, text) {
            const container = document.getElementById('messages');
            // 移除欢迎卡片
            const welcome = container.querySelector('.welcome-card');
            if (welcome) welcome.remove();

            const div = document.createElement('div');
            div.className = `msg ${type}`;
            div.innerHTML = text.replace(/\n/g, '<br>');
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function addTyping() {
            const container = document.getElementById('messages');
            const welcome = container.querySelector('.welcome-card');
            if (welcome) welcome.remove();

            const div = document.createElement('div');
            div.className = 'msg ai typing-indicator';
            div.id = 'typing-' + Date.now();
            div.innerHTML = '<span></span><span></span><span></span>';
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
            return div.id;
        }

        function removeTyping(id) {
            const el = document.getElementById(id);
            if (el) el.remove();
        }

        // ==================== 工具函数 ====================
        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // Textarea 自动调整高度
        document.getElementById('question-input').addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 120) + 'px';
        });

        // ==================== 启动 ====================
        init();
    </script>
</body>
</html>
