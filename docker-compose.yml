version: '3.8'

services:
  # ========== FastAPI 应用 ==========
  app:
    build: .
    container_name: rag-app
    ports:
      - "8000:8000"
    environment:
      - MYSQL_HOST=mysql
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads
      - ./data:/app/data
    restart: unless-stopped

  # ========== MySQL 数据库 ==========
  mysql:
    image: mysql:8.0
    container_name: rag-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: rag_knowledge_base
      MYSQL_USER: rag_user
      MYSQL_PASSWORD: rag_password_2024
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "rag_user", "-prag_password_2024"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  mysql_data:
